body:
  text: 中風蘇五一肝腎久衰內風襲絡脈象緩大肢體麻木舌強言謇此屬痱中之象陰氣不主上承當重培其下兼佐熄風熟地四錢淡蓯蓉三錢沙蒺藜二錢清阿膠二錢杞子二錢黃甘菊一錢茯神二錢鮑五四眩暈僕中口喎眼斜舌強言謇脈形浮散此屬晚年肝腎氣衰內風襲絡陰液無以上供擬滋陰熄風方制首烏四錢白蒺藜二錢淮牛膝二錢歸身一錢五分黃甘菊一錢炒枸杞子二錢明天麻二錢煨肝氣蘇六三夏令陽升目昏頭暈復遭嗔怒肝氣大作所以黎明跌僕遂致神昏脈形短數舌苔黃厚姑議滋清羚羊角一錢炒焦半曲一錢五分鬱金一錢小生地三錢橘紅一錢石菖蒲根三錢連翹心一錢五分川貝母二錢蘇六三前議滋清方服至兩劑神識稍清肝陽鬱勃已解臟陰虛損未復今幸納穀加餐腑陽無恙高年明是肝腎氣餒陰虛而陽無所附陽神失守致有目中妄見之象非脫陽見鬼也大忌祈禱擾動陽神恐陽愈偏而不返再擬鎮陽法以冀回春人參一錢清阿膠二錢生左牡蠣三錢五味子五分龍骨三錢茯神二錢生白芍一錢五分眩暈時六一痰火上實頭暈桑葉一錢炒焦半曲一錢五分鉤藤三錢羚羊角一錢五分廣皮白一錢白甘菊一錢明天麻二錢煨馮六三肝風內動眩暈制首烏四錢黃甘菊一錢白蒺藜一錢五分穭豆皮三錢杞子二錢云茯神二錢霜桑葉一錢倪四六煩勞則陽氣張大脈來寸急尺緩為嘔逆眩暈是厥陽變化內風鼓動而後上憑諸竅病不在乎中上經云上實下虛為厥巔疾信斯言也熟地四錢杞子二錢白蒺藜一錢五分清阿膠二錢菊花炭一錢云茯神二錢穭豆皮三錢頭風趙四五右偏頭風痛目赤少陽鬱火未熄霜桑葉一錢丹皮一錢白蒺藜炒一錢五分穭豆皮二錢黃甘菊一錢云茯神二錢制首烏三錢杞子二錢衛五二頭風痛嘔吐便秘肝陽化風上冒擬柔緩和陽復脈去參薑桂加牡蠣生左牡蠣三錢細生地三錢炙甘草五分清阿膠二錢麥冬二錢南棗三錢大麻仁一錢五分虛勞吳五四二氣交衰怯冷氣急妨食且護陽扶過一陽萌動再商人參一錢制淡川附子一錢茯苓三錢老薑汁臨服衝入五分廣皮白一錢炒焦半曲一錢陸三二經病陰損未復氣浮咳嗽胃納頗減兼有吞酸此屬下焦元海已竭生氣不至假借太陰面目非苦辛泄肺所宜熟地炭四錢遠志八分炒杞子炒一錢五分五味子一錢五分萸肉炭二錢紫衣胡桃肉一兩茯苓三錢戴三四二氣已偏熱熾氣急跗腫便溏當此夏令升泄難望久延人參一錢河車膠二錢胡桃肉五錢熟地炭三錢五味子五分云茯神二錢川斛四錢王三六胃氣方蘇肺陰未復咳逆便秘非泄肺所能治之北沙參二錢揀麥冬一錢五分叭噠杏仁三錢肥玉竹二錢川貝二錢南棗三錢云茯神二錢紫菀一錢生甘草三分上藥十帖熬膏董骨蒸潮熱便溏大生地四錢真小清膠二錢地骨皮三錢炙鱉甲五錢川連三分玉竹二錢釵石斛三錢王十二嗆逆咽痛便泄霜桑葉一錢叭噠杏仁三錢苡仁二錢象貝一錢五分炙草四分塊茯苓三錢嫩元參一錢五分炒焦建曲一錢五分又溏泄已止痰咳俱減治宜扶土生金蒸於術二錢苡仁二錢真川貝一錢五分揀麥冬去心一錢五分新會皮一錢塊茯苓三錢南沙參一錢五分黨參一錢咳嗽凌十四風溫上受咳嗽噁心鼻塞脈大象貝母一錢五分泡白杏仁三錢栝蔞皮一錢五分牛蒡子炒研一錢五分橘紅一錢黑山梔一錢五分霜桑葉一錢桔梗一錢陸廿八咳嗽痰多初愈復發霜桑葉一錢杏仁三錢桔梗一錢五分象貝二錢橘紅一錢連翹一錢五分馬兜鈴七分吳八歲咳嗽嘔逆中焦已痞肺氣以下行為順鮮枇杷葉三錢鬱金一錢冬瓜子三錢杏仁三錢栝蔞皮一錢五分桔梗一錢川貝母去心研二錢橘紅一錢徐十二咳嗽嗆血腹中鳴響咳早甚則知胃陰虛所服驅風降痰徒傷其陽耳白扁豆三錢玉竹二錢白粳米三錢炒麥冬二錢北沙參三錢南棗三錢川斛三錢生甘草三分馮四八咳嗽哮喘宜當溫散制麻黃五分橘紅一錢茯苓三錢川桂枝八分炙草四分生薑一錢杏仁三錢沈婦廿一寒熱頭痛咳嗽臥不著枕嘔逆此屬胃咳之狀當先制肝旋覆花絹包一錢製半夏一錢五分代赭石三錢川貝去心研二錢鬱金一錢茯苓三錢栝蔞皮一錢五分泡白杏仁三錢鍾二十脈虛細晨咳咳動即身熱拘束自汗腹中微痛望色㿠白病幾一月不痊昨進辛寒不應諒非邪著於裡是營衛二氣交怯宗經旨虛則補母之義黃耆建中湯去飴姜加牡蠣五味茯神嫩黃耆三錢桂枝八分南棗三錢五味子一錢炙草五分茯神二錢左牡蠣三錢大白芍一錢五分陳四六咳逆無痰已久經阻少腹有形瘕聚杜蘇子炒研一錢草鬱金一錢炒楂炭一錢五分栝蔞皮一錢五分炒桃仁去尖一錢歸鬚一錢五分黑山梔一錢五分粉丹皮一錢五分加降香末三分戴二歲面白無神咳嗽肺胃陰衰真川貝去心研一錢五分南沙參一錢五分叭噠杏仁研三錢梨汁制陳皮一錢茯神二錢川斛一錢五分吐血朱三三咳痰見血肺胃久虛桑葉一錢杏仁三錢川斛三錢大沙參二錢象貝一錢五分茯苓二錢玉竹二錢蔣三六吐血已止脈象弦數胃納不減咳嗽氣衝少陰久虛之象防血復來大淡菜一兩牛膝炭一錢五分白扁豆五錢川斛三錢參三七五分糯稻根鬚五錢白茯苓三錢徐三二嗔怒肝陽上升胃絡血湧諸氣皆以下行為順擬降氣法蘇子炒研一錢鬱金一錢南楂肉二錢桃仁炒一錢丹皮炒一錢五分黑山梔一錢五分降香末衝入五分魏四八心腎精血不充痰中帶血胃納頗佳後天生氣甚好不致損怯之虞熟地四兩遠志五錢山藥二兩萸肉二兩五味子一兩茯苓三兩芡實二兩建蓮三兩雷五四脈左堅肝腎陰傷失血生地炭三錢川斛三錢山藥二錢清阿膠二錢麥冬二錢茯苓二錢左牡蠣三錢五味子一錢五分陸五三吐血已止咳痰晡甚暮熱氣喘肺胃陰虛所致兼以養陰和陽川斛四錢白扁豆五錢炙草四分生地炭三錢麥冬二錢茯神二錢清阿膠二錢又昨進養陰和陽痰咳已緩暮熱盜汗寐醒即止再當鎮攝可安生左牡蠣三錢五味子一錢五分炙草四分清阿膠三錢麥冬二錢云茯神二錢熟地炭四錢遠志八分戴少陰久虧陽不潛藏肝腎之血亦隨氣升沖胃犯肺震動絡脈溢於其上以致咯出左關脈漸平右關濡軟略旺瘀行未盡略有咳逆前議熟地又取壯水乃陰旺陽乃復闢之意即經旨所謂陽在外陰之使也擬方候裁熟地四錢揀麥冬二錢淮牛膝炭一錢五分陳阿膠另烊沖二錢川貝母去心研一錢五分左牡蠣煆研三錢云茯神二錢北沙參一錢五分苡仁二錢又熟地四錢白蒺藜一錢五分云茯神二錢揀麥冬二錢霞天曲炒三錢制女貞一錢五分北沙參三錢川貝去心研二錢失音衛三十失音已久胃納頗佳非其氣之餒當金匱金實無聲議治麻黃三分石膏三錢杏仁三錢生草三分射干五分苡仁三錢錢四一肺象空懸其位最高據述曾經吐血之後聲音出不揚飲食少納乾咳頻多此屬少陰水虧不能濟火致君相上騰燔爍嬌臟不無受傷顧本是滋陰補虛為要然歲氣當深秋之際肅化猶為最先莫若暫用固金法從金生水意阿膠二錢北沙參一錢五分生地三錢生雞子黃一枚麥冬二錢川斛四錢茯神二錢生甘草三分戴瘀咯將淨痰咳亦緩肺胃絡脈乃肝陽潛伏漸有寧靜之象今診得左關弦形已退右關脈已鼓指而獨右寸軟弱左尺虛細右尺微小六脈雖未調和審體質未始不為平脈古人所謂未見病脈即平脈也仍擬養腎佐以健脾熟地四錢北沙參一錢五分淮山藥炒二錢陳阿膠二錢揀麥冬一錢五分建蓮去心二錢云茯神二錢川貝二錢蒲黃炒黑五分又填納下焦肝腎肺胃絡脈漸寧痰咯雖未淨盡而臟陰離絡之瘀已盡然而頤養寧神絡脈完固不致貽患仍擬肝腎定例少佐清化熟地四錢揀麥冬一錢五分建蓮二錢陳阿膠二錢川貝一錢五分淮山藥炒二錢左牡蠣三錢沙蒺藜二錢云茯神二錢又自瘀盡以來絡脈鞏固肝腎根蒂亦基痰咯亦少形神頗安脈右寸軟尺小弱餘部中和但此小雪節候值少陰用事之時只宜靜養以待一陽來復其調劑仍宗前議聊以益氣佐之熟地四錢西黨參二錢酸棗仁炒焦二錢陳阿膠二錢揀麥冬一錢五分云茯神二錢川貝一錢五分建蓮二錢炙草四分又照前議參脾為生痰之源治熟地四錢炒焦冬朮一錢五分棗仁炒黑二錢陳阿膠二錢新會皮一錢揀麥冬一錢五分云茯神二錢川貝去心研一錢五分人參另煎沖一錢又熟地四錢北沙參三錢建蓮去心三錢陳阿膠蛤粉炒二錢川貝去心研二錢淮牛膝炭一錢五分揀麥冬去心一錢五分云茯神二錢九孔石決明煆研三錢肺痿蘇四十咳嗽音啞防肺痿川石斛三錢炒扁豆五錢茯神二錢北沙參一錢五分麥冬三錢南棗三錢玉竹二錢魏冬溫咳嗽頻吐涎沫不能多飲胃納甚少此屬肺痿且擬甘緩為邪少虛多治法黃耆蜜炙三錢白芨二錢白百合三錢當歸一錢五分南棗三錢麥冬二錢生苡仁三錢炙草四分戴絡凝不固肝脈布脅嗆逆凝瘀左脈已靜右脈未和此即絡虛留滯之意議益陰和陽佐以宣絡原熟地四錢西黨參二錢建蓮去心二錢真川貝二錢陳阿膠蛤粉炒二錢米仁二錢旋覆花一錢云茯神二錢又人參另煎沖五分陳阿膠另烊沖二錢棗仁炒焦研三錢原熟地四錢大白芍一錢五分茯神二錢揀麥冬一錢五分遺精蔣廿三精泄無夢寤多寐少少陰不司藏聚熟地四錢遠志五分山藥二錢桑螵蛸二錢湖蓮三錢茯苓三錢柏子仁三錢芡實二錢徐四一多夢紛紜遺泄頻多經營之人擾神動心相火隨之擬介屬以潛之厚味以填之熟地四錢龜腹版五錢遠志五分萸肉二錢線膠二錢五味子一錢五分淡菜二錢湖蓮三錢芡實二錢張十八面色痿黃無夢遺泄左脈虛數此屬濕熱下注與固澀異政川萆薢三錢湖蓮三錢茯苓三錢炒黃柏一錢山藥二錢澤瀉一錢遠志一錢小便不通陳三十脈細面白小溲不通此屬中氣不足所致經旨謂膀胱者州都之官津液藏焉氣化則能出矣倘投泄肺以展氣化是實邪治法決不效驗生黃耆三錢炒焦半夏一錢五分茯苓三錢白朮二錢廣皮白一錢炙草五分高麗參一錢小便不禁周十八沖年遺溺知識太早腎臟不司藏聚非關足太陽腑經當從心腎議治亦腎與膀胱表裡相應之徵也熟地四錢覆盆子一錢芡實一錢桑螵蛸二錢龍骨生打三錢建蓮三錢遠志八分五味子一錢茯神二錢汗範三二脈細形寒自汗此屬衛陽式微人參一錢制淡附子一錢炙草五分熟於術二錢煨姜八分南棗三錢茯苓三錢龍三十衛疏汗泄生黃耆三錢煨姜一錢南棗三錢熟白朮二錢炙草五分茯神二錢防風六分歸三六夜寐汗泄甚多寐醒遍身如浴此屬盜汗是陰液所化腎衰不能內營使然議鎮陽以理虛生左牡蠣三錢龍骨三錢茯神二錢五味子一錢五分麥冬三錢南棗三錢防黨參一錢潘四三汗泄脈大勞傷營衛所致嫩黃耆三錢白芍一錢五分煨姜一錢當歸一錢二分炙草五分南棗三錢桂枝木四分脫錢三歲喘急脈細戴眼已現脫象無方倪一歲襁褓寒熱旬余肢腫腹脹便溏近加喘急戴眼是厥脫根萌此屬太陽已絕辰戌日期小心無方蘇三一中暍瘛瘲口噤不語法所不治勉擬黃土湯掘地尺余深取新汲水攪濁澄清頻飲洪三四陰寒格陽脈獨疾而散心胸熱熾面赤尤甚於兩顴煩渴乾嘔胸悶但欲寤危期至速勉擬熱因熱用之方俾乃導火歸原庶有生機之望上肉桂五分泡淡川附子一錢茯苓一錢五分淡乾薑八分熟半夏一錢五分炙草四分生白芍一錢五分邵五八昨脫癃閉勢甚窘迫欲解不